# ──────────────────────────────────────────────
# Repository (shown in top-right corner)
# ──────────────────────────────────────────────
[project.repo]
url  = "https://github.com/eth-cscs/cscs-docs"
edit_uri = "edit/main/docs/"

# ──────────────────────────────────────────────
# Theme
# ──────────────────────────────────────────────
[project.theme]
variant    = "classic"        # keeps the Material for MkDocs look
language   = "en"
logo       = "assets/cscs-logo.png"
custom_dir = "overrides"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

# Zensical inherits Material palette syntax inside [project.theme]
# Three entries mirror the auto / light / dark toggles in mkdocs.yml
# (palette is an array of tables)

[[project.theme.palette]]
media  = "(prefers-color-scheme)"
toggle = {icon = "material/brightness-auto", name = "Switch to light mode"}

[[project.theme.palette]]
media   = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "white"
accent  = "blue"
toggle  = {icon = "material/brightness-7", name = "Switch to dark mode"}

[[project.theme.palette]]
media   = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "white"
accent  = "blue"
toggle  = {icon = "material/brightness-4", name = "Switch to light mode"}

[project.theme.icon]
edit = "material/pencil"

[project.theme.features]
features = [
  "content.code.copy",
  "content.action.edit",
  "navigation.indexes",
  "search.share",
  "navigation.instant",
  "navigation.tracking",
  "navigation.path",
  "navigation.top",
  "content.code.annotate",
]

# ──────────────────────────────────────────────
# Extra CSS
# ──────────────────────────────────────────────
extra_css = ["stylesheets/extra.css"]

# ──────────────────────────────────────────────
# Plugins
# ──────────────────────────────────────────────
# Note: Zensical has built-in search; the trimmer pipeline and autorefs
# plugin may require separate installation if not yet bundled.
[project.plugins.search.pipeline]
pipeline = ["trimmer"]

[project.plugins.autorefs]

## ──────────────────────────────────────────────
## Markdown extensions
## ──────────────────────────────────────────────

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
# convert ascii dashes, quotes and ellipses to their HTML equivalents
[project.markdown_extensions.smarty]
[project.markdown_extensions.pymdownx.arithmatex]
    generic = true
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
    emoji_index = "zensical.extensions.emoji.twemoji" 
    emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
    anchor_linenums    = true
    line_spans         = "__span"
    pygments_lang_class = true
[project.markdown_extensions.pymdownx.snippets]
    check_paths = true
[project.markdown_extensions.pymdownx.superfences]
    custom_fences = [
      {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"},
    ]
[project.markdown_extensions.pymdownx.tabbed]
    alternate_style = true
[project.markdown_extensions.toc]
    permalink = true

